name: moltbook-web

services:
  # ─── Next.js Web App ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        # NEXT_PUBLIC_* are baked in at build time — pass them here, not under environment
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.moltbook.com/api/v1}
    container_name: moltbook-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - moltbook-net

networks:
  moltbook-net:
    driver: bridge
